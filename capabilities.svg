<svg xmlns="http://www.w3.org/2000/svg" width="860" height="290" viewBox="0 0 860 290" role="img" aria-label="What I build: AI Engineering and Full-Stack Development" font-family="'JetBrains Mono','SFMono-Regular','Courier New',monospace">
  <defs>
    <linearGradient id="sheenC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBEAD0" stop-opacity="0"/>
      <stop offset="0.46" stop-color="#FBEAD0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FBEAD0" stop-opacity="0.10"/>
      <stop offset="0.54" stop-color="#FBEAD0" stop-opacity="0"/>
      <stop offset="1" stop-color="#FBEAD0" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="5s" begin="0s" repeatCount="indefinite"/>
    </linearGradient>
    <mask id="panels">
      <rect x="20" y="20" width="390" height="250" rx="7" fill="#fff"/>
      <rect x="450" y="20" width="390" height="250" rx="7" fill="#fff"/>
    </mask>
  </defs>

  <!-- ░ LEFT PANEL — AI ENGINEERING ░ -->
  <rect x="20" y="20" width="390" height="250" rx="7" fill="#201F1F" stroke="#3A3836" stroke-width="1"/>
  <line x1="20" y1="58" x2="410" y2="58" stroke="#3A3836" stroke-width="1"/>
  <circle cx="44" cy="39" r="5" fill="#8A633C"/>
  <circle cx="62" cy="39" r="5" fill="#A99E90"/>
  <circle cx="80" cy="39" r="5" fill="#C2925A"/>
  <text x="104" y="44" font-size="15" fill="#C2925A">~/ai-engineering</text>
  <text x="40" y="96" font-size="15"><tspan fill="#C2925A">$</tspan><tspan fill="#ECE6DC" dx="8">what_i_build</tspan></text>
  <text x="40" y="134" font-size="14.5"><tspan fill="#C2925A">▸</tspan><tspan fill="#D8C4AD" dx="8">AI agents &amp; conversational systems</tspan></text>
  <text x="40" y="168" font-size="14.5"><tspan fill="#C2925A">▸</tspan><tspan fill="#D8C4AD" dx="8">RAG systems &amp; LLM integration</tspan></text>
  <text x="40" y="202" font-size="14.5"><tspan fill="#C2925A">▸</tspan><tspan fill="#D8C4AD" dx="8">Workflow automation &amp; pipelines</tspan></text>
  <text x="40" y="240" font-size="14.5"><tspan fill="#A99E90">// the model</tspan></text>
  <rect x="158" y="229" width="9" height="15" fill="#C2925A">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- ░ RIGHT PANEL — FULL-STACK ░ -->
  <rect x="450" y="20" width="390" height="250" rx="7" fill="#201F1F" stroke="#3A3836" stroke-width="1"/>
  <line x1="450" y1="58" x2="840" y2="58" stroke="#3A3836" stroke-width="1"/>
  <circle cx="474" cy="39" r="5" fill="#8A633C"/>
  <circle cx="492" cy="39" r="5" fill="#A99E90"/>
  <circle cx="510" cy="39" r="5" fill="#C2925A"/>
  <text x="534" y="44" font-size="15" fill="#C2925A">~/full-stack</text>
  <text x="470" y="96" font-size="15"><tspan fill="#C2925A">$</tspan><tspan fill="#ECE6DC" dx="8">what_i_build</tspan></text>
  <text x="470" y="134" font-size="14.5"><tspan fill="#C2925A">▸</tspan><tspan fill="#D8C4AD" dx="8">Web apps, dashboards &amp; sites</tspan></text>
  <text x="470" y="168" font-size="14.5"><tspan fill="#C2925A">▸</tspan><tspan fill="#D8C4AD" dx="8">APIs &amp; backend systems</tspan></text>
  <text x="470" y="202" font-size="14.5"><tspan fill="#C2925A">▸</tspan><tspan fill="#D8C4AD" dx="8">End-to-end production products</tspan></text>
  <text x="470" y="240" font-size="14.5"><tspan fill="#A99E90">// …to the UI</tspan></text>
  <rect x="585" y="229" width="9" height="15" fill="#C2925A">
    <animate attributeName="opacity" values="0;0;1;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- animated sheen across both panels -->
  <g mask="url(#panels)">
    <rect x="0" y="0" width="860" height="290" fill="url(#sheenC)"/>
  </g>
</svg>
