<svg xmlns="http://www.w3.org/2000/svg" width="760" height="284" viewBox="0 0 760 284" role="img" aria-label="git log of experience: AI Solutions Engineer at OneTouch Networks (Remote, SF), Jul 2025 to present; previously Freelance AI Engineer and Full-Stack Developer, 2024 to 2025." font-family="'JetBrains Mono','SFMono-Regular','Courier New',monospace">
  <defs>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C2925A"/><stop offset="1" stop-color="#8A633C"/></linearGradient>
    <radialGradient id="headGlow"><stop offset="0" stop-color="#D8A566" stop-opacity="0.8"/><stop offset="1" stop-color="#D8A566" stop-opacity="0"/></radialGradient>
    <clipPath id="exClip"><rect x="1" y="1" width="758" height="282" rx="9"/></clipPath>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="283" rx="9" fill="#201F1F" stroke="#3A3836" stroke-width="1"/>
  <line x1="0" y1="44" x2="760" y2="44" stroke="#3A3836" stroke-width="1"/>
  <circle cx="24" cy="22" r="4.5" fill="#8A633C"/>
  <circle cx="40" cy="22" r="4.5" fill="#A99E90"/>
  <circle cx="56" cy="22" r="4.5" fill="#C2925A"/>
  <text x="78" y="27" font-size="14" fill="#C2925A">~/experience</text>
  <text x="736" y="27" font-size="12" fill="#A99E90" text-anchor="end">git log</text>

  <g clip-path="url(#exClip)">
    <text x="28" y="78" font-size="14"><tspan fill="#C2925A">$</tspan><tspan fill="#D8C4AD" dx="8">git log --graph ~/experience</tspan></text>

    <rect x="42" y="106" width="2" height="104" fill="url(#rail)"/>

    <!-- commit 1 — HEAD -->
    <circle cx="43" cy="110" r="12" fill="url(#headGlow)"><animate attributeName="r" values="9;14;9" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="43" cy="110" r="5.5" fill="#201F1F" stroke="#C2925A" stroke-width="2.5"/>
    <text x="66" y="106" font-size="13.5"><tspan fill="#C2925A">7a1f9c2</tspan><tspan fill="#8A633C">&#160;(</tspan><tspan fill="#D8A566">HEAD -&gt; main</tspan><tspan fill="#8A633C">)</tspan></text>
    <text x="66" y="128" font-size="14.5"><tspan fill="#ECE6DC">AI Solutions Engineer</tspan><tspan fill="#A99E90">&#160;· OneTouch Networks — Remote (SF)</tspan></text>
    <text x="66" y="147" font-size="12.5" fill="#A99E90">Jul 2025 — Present</text>
    <text x="66" y="169" font-size="13.5"><tspan fill="#C2925A">▸</tspan><tspan fill="#D8C4AD" dx="8">Design &amp; ship AI agents that automate workflows for clients</tspan></text>
    <text x="66" y="189" font-size="13.5"><tspan fill="#C2925A">▸</tspan><tspan fill="#D8C4AD" dx="8">Deploy &amp; maintain production AI systems at scale</tspan></text>

    <!-- commit 2 -->
    <circle cx="43" cy="210" r="5.5" fill="#201F1F" stroke="#8A633C" stroke-width="2.5"/>
    <text x="66" y="206" font-size="13.5"><tspan fill="#C2925A">d4e2b08</tspan></text>
    <text x="66" y="228" font-size="14.5"><tspan fill="#ECE6DC">Freelance AI &amp; Full-Stack Developer</tspan><tspan fill="#A99E90">&#160;· Independent</tspan></text>
    <text x="66" y="247" font-size="12.5" fill="#A99E90">2024 — 2025</text>
    <text x="66" y="269" font-size="13.5"><tspan fill="#C2925A">▸</tspan><tspan fill="#D8C4AD" dx="8">Shipped Django + React products end to end (OpenAI / Gemini)</tspan></text>
